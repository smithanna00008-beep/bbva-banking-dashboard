<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBVA - Dashboard</title>
  <style>
    :root { --primary: #004A8F; --accent: #00B2A9; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1f3d;
      color: white;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.3);
    }
    .logo { font-size: 1.8rem; font-weight: 700; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 20px;
      margin: 15px;
    }
    .balance { font-size: 2.2rem; font-weight: 700; }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 15px;
    }
    .btn {
      text-align: center;
      padding: 12px 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 0.85rem;
    }
    .transaction {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .positive { color: #00B2A9; }
    .negative { color: #FF5C5C; }
    nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #001233;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <header>
    <div>☰</div>
    <div class="logo">BBVA</div>
    <div>🛎️</div>
  </header>

  <div style="padding: 20px;">
    <h2>Hola, <span id="greeting">Alejandro</span></h2>
    <p id="date" style="opacity:0.7;"></p>

    <!-- Main Account -->
    <div class="card">
      <div style="display:flex; justify-content:space-between;">
        <div>
          <div style="opacity:0.7;">Cuenta de Cheques</div>
          <div style="font-size:1.1rem;" id="accountNum">••1234</div>
        </div>
        <div style="text-align:right;">
          <div class="balance" id="balance">$ 127,540.00</div>
        </div>
      </div>
      <button onclick="viewMovements()" style="margin-top:15px; width:100%; padding:12px; background:var(--primary); border:none; border-radius:12px; color:white;">
        Ver movimientos
      </button>
    </div>

    <!-- Quick Actions -->
    <div class="btn-grid">
      <div class="btn" onclick="goTo('transfer.html')">↔ Transferir</div>
      <div class="btn">📄 Pagar servicios</div>
      <div class="btn">💵 Retirar</div>
      <div class="btn">📈 Inversiones</div>
      <div class="btn">🏦 Préstamos</div>
    </div>

    <!-- Cards -->
    <div style="display:flex; gap:10px; padding:0 15px;">
      <div class="card" style="flex:1; background:linear-gradient(135deg, #003087, #001233);">
        <div>BBVA Débito</div>
        <div style="margin:20px 0;">••1234</div>
        <div>VISA</div>
      </div>
      <div class="card" style="flex:1; background:linear-gradient(135deg, #D4A017, #B8860B); color:#000;">
        <div>BBVA Crédito</div>
        <div style="margin:20px 0;">••5678</div>
        <div>VISA</div>
      </div>
    </div>

    <!-- Recent Movements -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <strong>Movimientos recientes</strong>
        <span onclick="goTo('transactions.html')" style="color:var(--accent); cursor:pointer;">Ver todas</span>
      </div>
      <div id="transactions"></div>
    </div>
  </div>

  <nav>
    <div onclick="location.reload()">🏠 Inicio</div>
    <div>💳 Productos</div>
    <div style="background:var(--accent); color:black; border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center; margin-top:-30px; font-size:1.5rem;">$</div>
    <div>❓ Ayuda</div>
    <div>☰ Menú</div>
  </nav>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby5pUGL7oWB5TZmjnNCt1GJIYvLKtyL1tNde-JypZaIkWcJBbQkXGvgjlKjiZBND7Q/exec';

    async function loadDashboard() {
      const userId = localStorage.getItem('userId');
      if (!userId) return window.location.href = 'index.html';

      document.getElementById('greeting').textContent = localStorage.getItem('fullName') || 'Alejandro';
      document.getElementById('date').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

      const res = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getDashboardData', userId })
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('balance').textContent = '$ ' + data.balance.toLocaleString('es-MX');
        document.getElementById('accountNum').textContent = data.accountNumber;

        const transContainer = document.getElementById('transactions');
        transContainer.innerHTML = data.transactions.map(t => `
          <div class="transaction">
            <div>
              <div>${t.description}</div>
              <div style="font-size:0.85rem; opacity:0.7;">${t.date}</div>
            </div>
            <div class="${t.amount > 0 ? 'positive' : 'negative'}">
              ${t.amount > 0 ? '+' : ''}$${Math.abs(t.amount).toLocaleString('es-MX')}
            </div>
          </div>
        `).join('');
      }
    }

    function goTo(page) {
      window.location.href = page;
    }

    function viewMovements() {
      goTo('transactions.html');
    }

    window.onload = loadDashboard;
  </script>
</body>
</html>
