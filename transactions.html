<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - BBVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #041530; color: white; }
        .movement-card { transition: all 0.3s ease; }
        .movement-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-md mx-auto p-4">
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='index.html'" class="text-blue-400">
                <i class="fa-solid fa-arrow-left text-2xl"></i>
            </button>
            <h1 class="text-2xl font-bold">Transaction History</h1>
            <div></div>
        </div>

        <div id="transactionsList" class="space-y-4">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzGhGUVwBDdqtKpfJnEjibTqybwua-5FEjRRKzsXLknXSbgpA84ssFw2jd8X5vX7QYoYQ/exec";
        let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

        async function loadTransactions() {
            if (!loggedInUser) {
                window.location.href = 'index.html';
                return;
            }
            try {
                const res = await fetch(API_URL + "?tab=Movements");
                const data = await res.json();
                const container = document.getElementById('transactionsList');
                container.innerHTML = '';

                const userMovs = data.filter(m => (m.username === loggedInUser.username || m.user_id === loggedInUser.username));
                
                if (userMovs.length === 0) {
                    container.innerHTML = `<div class="text-center text-gray-400 py-12">No transactions yet</div>`;
                    return;
                }

                userMovs.forEach(mov => {
                    const amountNum = parseFloat(mov.amount) || 0;
                    const sign = amountNum > 0 ? '+' : '';
                    const color = amountNum > 0 ? 'text-emerald-400' : 'text-red-400';
                    const card = document.createElement('div');
                    card.className = "bg-[#072146] border border-blue-900 p-4 rounded-2xl movement-card";
                    card.innerHTML = `
                        <div class="flex justify-between">
                            <div>
                                <p class="font-semibold">${mov.description || mov.type || 'Transaction'}</p>
                                <p class="text-xs text-gray-400">${mov.date}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold ${color}">${sign}$${Math.abs(amountNum).toFixed(2)}</p>
                                <p class="text-xs ${mov.status === 'Pending' ? 'text-yellow-400' : 'text-emerald-400'}">${mov.status || 'Processing'}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch(e) {
                console.error(e);
            }
        }

        window.onload = loadTransactions;
    </script>
</body>
</html>
