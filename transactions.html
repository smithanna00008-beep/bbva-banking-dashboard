<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBVA - Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #041530; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glow-box {
            background: linear-gradient(145deg, rgba(10, 58, 118, 0.4) 0%, rgba(4, 21, 48, 0.6) 100%);
            box-shadow: 0 0 40px rgba(20, 117, 217, 0.25);
        }
    </style>
</head>
<body class="text-white min-h-screen pb-24">
    <div class="max-w-md mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <button onclick="window.history.back()" class="text-blue-400"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-2xl font-bold">Transaction History</h1>
            <div></div>
        </div>
        <div id="transactionsList" class="space-y-4">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzGhGUVwBDdqtKpfJnEjibTqybwua-5FEjRRKzsXLknXSbgpA84ssFw2jd8X5vX7QYoYQ/exec";
        let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

        async function loadTransactions() {
            if (!loggedInUser) return;
            try {
                const res = await fetch(API_URL + "?tab=Movements");
                const data = await res.json();
                const userMovs = data.filter(m => m.username === loggedInUser.username || m.user_id === loggedInUser.username);
                const container = document.getElementById('transactionsList');
                container.innerHTML = '';
                userMovs.forEach(mov => {
                    const amount = parseFloat(mov.amount) || 0;
                    const sign = amount > 0 ? '+' : '';
                    const color = amount > 0 ? 'text-emerald-400' : 'text-red-400';
                    const div = document.createElement('div');
                    div.className = "bg-[#072146] p-4 rounded-2xl";
                    div.innerHTML = `
                        <div class="flex justify-between">
                            <div>
                                <p>${mov.description || mov.type || 'Transaction'}</p>
                                <p class="text-xs text-gray-400">${mov.date}</p>
                            </div>
                            <div class="text-right">
                                <p class="${color} font-bold">${sign}$${Math.abs(amount).toFixed(2)}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) {}
        }

        window.onload = loadTransactions;
    </script>
</body>
</html>
