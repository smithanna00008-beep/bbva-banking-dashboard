<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - BBVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #041530; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .chat-container { height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 20px; }
        .message-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; margin-bottom: 8px; position: relative; }
        .received { background: #1f1f1f; border-bottom-left-radius: 4px; }
        .sent { background: #1475d9; color: white; border-bottom-right-radius: 4px; }
        .timestamp { font-size: 10px; opacity: 0.7; margin-top: 2px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="flex items-center justify-between px-6 py-4 border-b border-blue-900 bg-[#041530]">
        <button onclick="goBackToDashboard()" class="text-blue-400 flex items-center gap-1">
            ← Back
        </button>
        <div class="text-center">
            <p class="font-medium">Support Chat</p>
            <p class="text-xs text-emerald-400">Online</p>
        </div>
        <div class="w-8"></div>
    </header>

    <div id="chatContainer" class="flex-1 p-4 chat-container bg-[#020b18]">
        <!-- Messages load here -->
    </div>

    <div class="p-4 border-t border-blue-900 bg-[#041530]">
        <div class="flex gap-2">
            <input type="text" id="messageInput" placeholder="Type a message..." 
                   class="flex-1 bg-[#072146] border border-blue-800 rounded-2xl px-5 py-3 text-white focus:outline-none" 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 rounded-2xl font-medium">Send</button>
        </div>
        <div class="text-center mt-2">
            <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="sendPhoto(this)">
            <button onclick="document.getElementById('photoUpload').click()" class="text-xs text-blue-400 hover:text-white">📎 Send Photo / Document</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyIvkHELP41Lf8zzdjilYWozkwbUS18HEajXA7yBpV5xoxVw7vJ6zPAVyf8LN85y2FdFw/exec";
        let userId = localStorage.getItem("userId");

        if (!userId) {
            window.location.href = "index.html";
        }

        let messagesCache = [];

        async function loadMessages(silent = false) {
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=${userId}`);
                const result = await res.json();

                if (result.status === "success") {
                    messagesCache = result.messages;
                    renderMessages();
                }
            } catch (e) {
                if (!silent) console.error("Failed to load messages");
            }
        }

        function renderMessages() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = messagesCache.map(msg => `
                <div class="flex ${msg.sender === userId ? 'justify-end' : 'justify-start'}">
                    <div class="message-bubble ${msg.sender === userId ? 'sent' : 'received'}">
                        ${msg.message}
                        <p class="timestamp">${msg.timestamp}</p>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // Show message immediately (optimistic update)
            messagesCache.push({
                sender: userId,
                message: text,
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            renderMessages();

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "submitMessage",
                        senderId: userId,
                        message: text
                    })
                });
            } catch (e) {
                console.error("Failed to send");
            }

            input.value = '';
        }

        async function sendPhoto(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const base64 = e.target.result;
                const preview = `<img src="${base64}" class="max-w-[220px] rounded-xl">`;

                messagesCache.push({
                    sender: userId,
                    message: preview,
                    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                renderMessages();

                try {
                    await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "submitMessage",
                            senderId: userId,
                            message: base64
                        })
                    });
                } catch (e) {
                    console.error("Failed to send photo");
                }
            };
            reader.readAsDataURL(file);
        }

        function goBackToDashboard() {
            window.location.href = "index.html";
        }

        // Initial load + gentle refresh
        loadMessages();
        setInterval(() => loadMessages(true), 5000); // silent refresh
    </script>
</body>
</html>
