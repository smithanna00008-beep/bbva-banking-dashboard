<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Tesla Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .chat-container { height: calc(100vh - 140px); }
        .message-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; }
        .received { background: #1f1f1f; border-bottom-left-radius: 4px; }
        .sent { background: #E82127; color: white; border-bottom-right-radius: 4px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d]">
        <a href="index.html" class="text-neutral-400 hover:text-white flex items-center text-sm">
            ‹ Back
        </a>
        <div class="text-center">
            <p class="font-medium">Support Chat</p>
            <p class="text-xs text-emerald-400">Online</p>
        </div>
        <div class="w-8"></div>
    </header>

    <!-- Chat Area -->
    <div id="chatContainer" class="flex-1 p-4 overflow-y-auto space-y-4 chat-container bg-[#0a0a0a]">
        <!-- Messages load here -->
    </div>

    <!-- Input Area -->
    <div class="p-4 border-t border-[#222] bg-[#0d0d0d]">
        <div class="flex gap-2">
            <input type="text" id="messageInput" placeholder="Type a message..." 
                   class="flex-1 bg-[#1c1c1c] border border-[#333] rounded-2xl px-5 py-3 text-white focus:outline-none focus:border-[#E82127]">
            <button onclick="sendMessage()" 
                    class="bg-[#E82127] text-white px-6 rounded-2xl font-medium">Send</button>
        </div>
        <div class="text-center mt-2">
            <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="sendPhoto(this)">
            <button onclick="document.getElementById('photoUpload').click()" 
                    class="text-xs text-neutral-400 hover:text-white">📷 Send Photo</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";
        const userId = localStorage.getItem("userId");

        if (!userId) {
            window.location.href = "index.html";
        }

        async function loadMessages() {
            const container = document.getElementById('chatContainer');
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=${userId}`);
                const result = await res.json();

                if (result.status === "success") {
                    container.innerHTML = result.messages.map(msg => `
                        <div class="flex ${msg.sender === userId ? 'justify-end' : 'justify-start'}">
                            <div class="message-bubble ${msg.sender === userId ? 'sent' : 'received'}">
                                ${msg.message}
                                <p class="text-[10px] mt-1 opacity-75">${msg.timestamp}</p>
                            </div>
                        </div>
                    `).join('');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) {
                container.innerHTML = '<div class="text-center text-red-400 py-8">Failed to load messages</div>';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "submitMessage",
                        senderId: userId,
                        message: text
                    })
                });
                input.value = '';
                loadMessages();
            } catch (e) {
                alert("Failed to send message");
            }
        }

        async function sendPhoto(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const base64 = e.target.result;
                try {
                    await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "submitMessage",
                            senderId: userId,
                            message: `<img src="${base64}" class="max-w-[200px] rounded-xl">`
                        })
                    });
                    loadMessages();
                } catch (e) {
                    alert("Failed to send photo");
                }
            };
            reader.readAsDataURL(file);
        }

        // Load messages on start and refresh every 4 seconds
        loadMessages();
        setInterval(loadMessages, 4000);
    </script>
</body>
</html>
