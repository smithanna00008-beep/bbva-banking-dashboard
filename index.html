<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #072146; /* BBVA Dark Blue */
            font-family: sans-serif;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-start p-4">

    <div class="w-full max-w-md flex justify-end mb-4">
        <button id="langBtn" onclick="toggleLanguage()" class="bg-blue-900 text-xs px-3 py-1 rounded border border-blue-700">
            EN
        </button>
    </div>

    <div id="authContainer" class="w-full max-w-md bg-[#0a2e5c] p-6 rounded-lg shadow-lg">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold tracking-wider text-white">BBVA</h1>
        </div>

        <div id="loginForm">
            <h2 id="loginTitle" class="text-xl font-semibold mb-4">Iniciar Sesión</h2>
            <input type="text" id="loginUser" placeholder="Usuario" class="w-full p-3 mb-3 rounded bg-blue-950 border border-blue-800 text-white placeholder-gray-400 focus:outline-none">
            <input type="password" id="loginPass" placeholder="Contraseña" class="w-full p-3 mb-4 rounded bg-blue-950 border border-blue-800 text-white placeholder-gray-400 focus:outline-none">
            <button onclick="handleLogin()" id="loginBtnText" class="w-full bg-[#1475d9] hover:bg-blue-600 text-white py-3 rounded font-bold transition">Entrar</button>
            <p class="text-sm mt-4 text-center text-gray-300">
                <span id="noAccountText">¿No tienes cuenta?</span> 
                <a href="#" onclick="showSignUp()" class="text-blue-400 underline" id="signUpLinkText">Regístrate</a>
            </p>
        </div>

        <div id="signUpForm" class="hidden">
            <h2 id="signUpTitle" class="text-xl font-semibold mb-4">Crear Cuenta</h2>
            <input type="text" id="regUser" placeholder="Usuario" class="w-full p-3 mb-2 rounded bg-blue-950 border border-blue-800 text-white placeholder-gray-400 focus:outline-none">
            <input type="text" id="regName" placeholder="Nombre Completo" class="w-full p-3 mb-2 rounded bg-blue-950 border border-blue-800 text-white placeholder-gray-400 focus:outline-none">
            <input type="email" id="regEmail" placeholder="Correo electrónico" class="w-full p-3 mb-2 rounded bg-blue-950 border border-blue-800 text-white placeholder-gray-400 focus:outline-none">
            <input type="text" id="regPhone" placeholder="Número de Celular" class="w-full p-3 mb-2 rounded bg-blue-950 border border-blue-800 text-white placeholder-gray-400 focus:outline-none">
            <input type="password" id="regPass" placeholder="Contraseña" class="w-full p-3 mb-4 rounded bg-blue-950 border border-blue-800 text-white placeholder-gray-400 focus:outline-none">
            <button onclick="handleSignUp()" id="submitSignUpBtn" class="w-full bg-[#1475d9] hover:bg-blue-600 text-white py-3 rounded font-bold transition">Registrarse</button>
            <p class="text-sm mt-4 text-center text-gray-300">
                <span id="haveAccountText">¿Ya tienes cuenta?</span> 
                <a href="#" onclick="showLogin()" class="text-blue-400 underline" id="loginLinkText">Inicia sesión</a>
            </p>
        </div>
    </div>

    <div id="dashboardContainer" class="w-full max-w-md hidden">
        
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-gray-400 text-sm" id="greetingDay">Hola,</p>
                <h2 id="userGreetingName" class="text-2xl font-bold">Alejandro</h2>
            </div>
            <button onclick="logout()" class="bg-red-800 hover:bg-red-700 text-xs px-3 py-1 rounded">Logout</button>
        </div>

        <div class="bg-[#0a2e5c] p-5 rounded-lg mb-6 border border-blue-900">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold" id="cardLabel">Cuenta de Cheques</span>
                <span class="text-xs text-gray-400">• • 1234</span>
            </div>
            <p class="text-xs text-gray-400 mb-1" id="availableLabel">Saldo disponible</p>
            <p class="text-3xl font-bold mb-1" id="dashBalance">$ 0.00</p>
            <p class="text-xs text-gray-400" id="actualLabel">Saldo actual: $ 0.00</p>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-6">
            <div class="bg-[#0a2e5c] p-3 rounded-lg text-center flex flex-col items-center cursor-pointer">
                <i class="fa-solid fa-arrow-right-arrow-left text-[#1475d9] text-xl mb-1"></i>
                <span class="text-[10px]" id="actTransfer">Transferir</span>
            </div>
            <div class="bg-[#0a2e5c] p-3 rounded-lg text-center flex flex-col items-center cursor-pointer">
                <i class="fa-solid fa-receipt text-[#1475d9] text-xl mb-1"></i>
                <span class="text-[10px]" id="actPay">Pagar serv.</span>
            </div>
            <div class="bg-[#0a2e5c] p-3 rounded-lg text-center flex flex-col items-center cursor-pointer">
                <i class="fa-solid fa-money-bill-transfer text-[#1475d9] text-xl mb-1"></i>
                <span class="text-[10px]" id="actWithdraw">Retirar</span>
            </div>
            <div class="bg-[#0a2e5c] p-3 rounded-lg text-center flex flex-col items-center cursor-pointer">
                <i class="fa-solid fa-chart-line text-[#1475d9] text-xl mb-1"></i>
                <span class="text-[10px]" id="actInvest">Inversiones</span>
            </div>
        </div>

        <div class="bg-[#0a2e5c] p-5 rounded-lg mb-6 border border-blue-900">
            <h3 class="text-xs text-gray-400 uppercase tracking-wider mb-1" id="investLabel">Inversiones</h3>
            <p class="text-2xl font-bold" id="dashInvestments">$ 0.00</p>
            <span class="text-xs text-emerald-400 font-semibold" id="dashYield">+12.35%</span>
        </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYds8gGtgIOA8QiCyyWaI-v3vEdX7_02siN7JEfHT7syAhVb_knK32PaIzTCM1iUdXqA/exec";
        let currentLang = 'es';
        let allUsers = [];

        // Language Dictionary
        const translations = {
            es: {
                langBtn: "EN",
                loginTitle: "Iniciar Sesión",
                loginUser: "Usuario",
                loginPass: "Contraseña",
                loginBtnText: "Entrar",
                noAccountText: "¿No tienes cuenta?",
                signUpLinkText: "Regístrate",
                signUpTitle: "Crear Cuenta",
                regUser: "Usuario",
                regName: "Nombre Completo",
                regEmail: "Correo electrónico",
                regPhone: "Número de Celular",
                regPass: "Contraseña",
                submitSignUpBtn: "Registrarse",
                haveAccountText: "¿Ya tienes cuenta?",
                loginLinkText: "Inicia sesión",
                greetingDay: "Hola,",
                cardLabel: "Cuenta de Cheques",
                availableLabel: "Saldo disponible",
                actualLabel: "Saldo actual: ",
                actTransfer: "Transferir",
                actPay: "Pagar serv.",
                actWithdraw: "Retirar",
                actInvest: "Inversiones",
                investLabel: "Inversiones"
            },
            en: {
                langBtn: "ES",
                loginTitle: "Log In",
                loginUser: "Username",
                loginPass: "Password",
                loginBtnText: "Sign In",
                noAccountText: "Don't have an account?",
                signUpLinkText: "Sign Up",
                signUpTitle: "Create Account",
                regUser: "Username",
                regName: "Full Name",
                regEmail: "Email",
                regPhone: "Phone Number",
                regPass: "Password",
                submitSignUpBtn: "Register",
                haveAccountText: "Already have an account?",
                loginLinkText: "Log In",
                greetingDay: "Hello,",
                cardLabel: "Checking Account",
                availableLabel: "Available balance",
                actualLabel: "Current balance: ",
                actTransfer: "Transfer",
                actPay: "Pay Services",
                actWithdraw: "Withdraw",
                actInvest: "Investments",
                investLabel: "Investments"
            }
        };

        // Geolocation check for Mexico to auto-set language
        async function autoDetectLanguage() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data.country_code === 'MX') {
                    setLanguage('es');
                } else {
                    setLanguage('en');
                }
            } catch (e) {
                setLanguage('es'); // Default to Spanish if blocked
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('langBtn').innerText = translations[lang].langBtn;
            document.getElementById('loginTitle').innerText = translations[lang].loginTitle;
            document.getElementById('loginUser').placeholder = translations[lang].loginUser;
            document.getElementById('loginPass').placeholder = translations[lang].loginPass;
            document.getElementById('loginBtnText').innerText = translations[lang].loginBtnText;
            document.getElementById('noAccountText').innerText = translations[lang].noAccountText;
            document.getElementById('signUpLinkText').innerText = translations[lang].signUpLinkText;
            document.getElementById('signUpTitle').innerText = translations[lang].signUpTitle;
            document.getElementById('regUser').placeholder = translations[lang].regUser;
            document.getElementById('regName').placeholder = translations[lang].regName;
            document.getElementById('regEmail').placeholder = translations[lang].regEmail;
            document.getElementById('regPhone').placeholder = translations[lang].regPhone;
            document.getElementById('regPass').placeholder = translations[lang].regPass;
            document.getElementById('submitSignUpBtn').innerText = translations[lang].submitSignUpBtn;
            document.getElementById('haveAccountText').innerText = translations[lang].haveAccountText;
            document.getElementById('loginLinkText').innerText = translations[lang].loginLinkText;
            document.getElementById('greetingDay').innerText = translations[lang].greetingDay;
            document.getElementById('cardLabel').innerText = translations[lang].cardLabel;
            document.getElementById('availableLabel').innerText = translations[lang].availableLabel;
            document.getElementById('actTransfer').innerText = translations[lang].actTransfer;
            document.getElementById('actPay').innerText = translations[lang].actPay;
            document.getElementById('actWithdraw').innerText = translations[lang].actWithdraw;
            document.getElementById('actInvest').innerText = translations[lang].actInvest;
            document.getElementById('investLabel').innerText = translations[lang].investLabel;
        }

        function toggleLanguage() {
            setLanguage(currentLang === 'es' ? 'en' : 'es');
        }

        // Toggle Views
        function showSignUp() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signUpForm').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('signUpForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        // Fetch Users from Google Sheet
        async function fetchUsers() {
            try {
                const res = await fetch(API_URL);
                allUsers = await res.json();
            } catch (err) {
                console.error("Error loading user data:", err);
            }
        }

        // Login Handler
        async function handleLogin() {
            const userVal = document.getElementById('loginUser').value.trim();
            const passVal = document.getElementById('loginPass').value;

            if(!allUsers.length) await fetchUsers();

            const user = allUsers.find(u => u.username === userVal && String(u.password) === passVal);

            if (user) {
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                
                // Populate dashboard
                document.getElementById('userGreetingName').innerText = user.fullName;
                
                // Format currencies
                const formatter = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' });
                document.getElementById('dashBalance').innerText = formatter.format(user.balance);
                document.getElementById('actualLabel').innerText = `${translations[currentLang].actualLabel} ${formatter.format(user.balance)}`;
                document.getElementById('dashInvestments').innerText = formatter.format(user.investments);
            } else {
                alert(currentLang === 'es' ? 'Credenciales incorrectas' : 'Invalid credentials');
            }
        }

        // Sign Up Handler (Simulated)
        function handleSignUp() {
            alert(currentLang === 'es' ? '¡Registro simulado con éxito! Por favor, inicia sesión.' : 'Simulated registration successful! Please log in.');
            showLogin();
        }

        function logout() {
            document.getElementById('dashboardContainer').classList.add('hidden');
            document.getElementById('authContainer').classList.remove('hidden');
        }

        // Initialize App
        window.onload = () => {
            autoDetectLanguage();
            fetchUsers();
        };
    </script>
</body>
</html>
