<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Support - BBVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #041530; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .message-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; margin-bottom: 12px; }
        .received { background: #1f1f1f; }
        .sent { background: #1475d9; color: white; }
        img { max-width: 260px; border-radius: 12px; margin: 6px 0; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="px-6 py-4 border-b border-blue-900 bg-[#041530] flex justify-between">
        <h1 class="text-lg font-bold">Admin Replies</h1>
        <button onclick="window.location.href='index.html'" class="text-blue-400">Dashboard</button>
    </header>

    <div class="p-4 border-b border-blue-900 bg-[#072146]">
        <select id="userSelect" class="w-full bg-[#020b18] border border-blue-800 rounded-xl p-3 text-white">
            <option value="">Select User to Reply</option>
        </select>
    </div>

    <div id="chatContainer" class="flex-1 p-4 overflow-y-auto bg-[#020b18]">
    </div>

    <div class="p-4 border-t border-blue-900 bg-[#041530]">
        <div class="flex gap-2">
            <input type="text" id="replyInput" placeholder="Reply..." 
                   class="flex-1 bg-[#072146] border border-blue-800 rounded-2xl px-5 py-3 focus:outline-none"
                   onkeypress="if(event.key==='Enter') sendReply()">
            <button onclick="sendReply()" class="bg-blue-600 px-6 rounded-2xl">Send</button>
        </div>
        <div class="text-center mt-3">
            <input type="file" id="photoUpload" accept="image/*" class="hidden" onchange="sendAdminPhoto(this)">
            <button onclick="document.getElementById('photoUpload').click()" class="text-blue-400">📎 Send Photo</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyIvkHELP41Lf8zzdjilYWozkwbUS18HEajXA7yBpV5xoxVw7vJ6zPAVyf8LN85y2FdFw/exec";
        let selectedUserId = null;

        async function loadUsers() {
            const select = document.getElementById('userSelect');
            try {
                const res = await fetch(API_URL);
                const users = await res.json();
                users.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.username;
                    opt.textContent = u.fullName || u.username;
                    select.appendChild(opt);
                });
            } catch(e) {}
        }

        document.getElementById('userSelect').addEventListener('change', function() {
            selectedUserId = this.value;
            if (selectedUserId) loadMessages();
        });

        async function loadMessages() {
            if (!selectedUserId) return;
            const container = document.getElementById('chatContainer');
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=${selectedUserId}`);
                const result = await res.json();
                let html = '';
                result.messages.forEach(m => {
                    const isAdmin = m.sender === 'admin';
                    html += `
                        <div class="flex ${isAdmin ? 'justify-end' : 'justify-start'}">
                            <div class="message-bubble ${isAdmin ? 'sent' : 'received'}">
                                ${m.message.includes('data:image') ? `<img src="${m.message}">` : m.message}
                                <div class="text-xs opacity-70 mt-1">${m.timestamp}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            } catch(e) {}
        }

        async function sendReply() {
            if (!selectedUserId) return alert("Select a user first");
            const input = document.getElementById('replyInput');
            const text = input.value.trim();
            if (!text) return;

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({
                    action: "submitMessage",
                    senderId: "admin",
                    receiverId: selectedUserId,
                    message: text
                })
            });
            input.value = '';
            loadMessages();
        }

        async function sendAdminPhoto(input) {
            if (!selectedUserId || !input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "submitMessage",
                        senderId: "admin",
                        receiverId: selectedUserId,
                        message: base64
                    })
                });
                loadMessages();
            };
            reader.readAsDataURL(input.files[0]);
        }

        loadUsers();
        setInterval(() => { if (selectedUserId) loadMessages(); }, 4000);
    </script>
</body>
</html>
