<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Support - BBVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #041530; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .message-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; margin-bottom: 8px; }
        .received { background: #1f1f1f; }
        .sent { background: #1475d9; color: white; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="flex items-center justify-between px-6 py-4 border-b border-blue-900 bg-[#041530]">
        <h1 class="text-lg font-bold">Admin Support Replies</h1>
    </header>

    <div id="chatContainer" class="flex-1 p-4 overflow-y-auto bg-[#020b18]">
        <!-- Messages -->
    </div>

    <div class="p-4 border-t border-blue-900 bg-[#041530]">
        <input type="text" id="replyInput" placeholder="Type reply..." 
               class="w-full bg-[#072146] border border-blue-800 rounded-2xl px-5 py-3 text-white" 
               onkeypress="if(event.key === 'Enter') sendReply()">
        <button onclick="sendReply()" class="w-full mt-2 bg-blue-600 py-3 rounded-2xl">Send Reply</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyIvkHELP41Lf8zzdjilYWozkwbUS18HEajXA7yBpV5xoxVw7vJ6zPAVyf8LN85y2FdFw/exec";

        async function loadMessages() {
            const container = document.getElementById('chatContainer');
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=all`);
                const result = await res.json();
                container.innerHTML = result.messages.map(m => `
                    <div class="message-bubble ${m.sender === 'admin' ? 'sent' : 'received'}">
                        <strong>${m.sender}:</strong> ${m.message}
                        <div class="text-xs opacity-70">${m.timestamp}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            } catch(e) {}
        }

        async function sendReply() {
            const input = document.getElementById('replyInput');
            const text = input.value.trim();
            if (!text) return;

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({
                    action: "submitMessage",
                    senderId: "admin",
                    message: text
                })
            });
            input.value = '';
            loadMessages();
        }

        loadMessages();
        setInterval(loadMessages, 4000);
    </script>
</body>
</html>
