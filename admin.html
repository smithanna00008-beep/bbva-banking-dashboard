<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #041530; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .message-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; }
        .received { background: #1f1f1f; border-bottom-left-radius: 4px; }
        .sent { background: #1475d9; color: white; border-bottom-right-radius: 4px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="flex items-center justify-between px-6 py-4 border-b border-blue-900 bg-[#041530]">
        <a href="index.html" class="text-blue-400">← Back</a>
        <h1 class="text-lg font-bold">Admin Support</h1>
        <div></div>
    </header>

    <div id="chatContainer" class="flex-1 p-4 overflow-y-auto space-y-4 bg-[#020b18]">
        <!-- Messages load here -->
    </div>

    <div class="p-4 border-t border-blue-900 bg-[#041530]">
        <div class="flex gap-2">
            <input type="text" id="replyInput" placeholder="Reply to user..." 
                   class="flex-1 bg-[#072146] border border-blue-800 rounded-2xl px-5 py-3 text-white focus:outline-none">
            <button onclick="sendAdminReply()" class="bg-blue-600 px-6 rounded-2xl">Send</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";
        let currentUserId = null; // You can change this to target specific user

        async function loadAdminMessages() {
            const container = document.getElementById('chatContainer');
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=${currentUserId || 'all'}`);
                const result = await res.json();

                container.innerHTML = result.messages.map(msg => `
                    <div class="flex ${msg.sender === 'admin' ? 'justify-end' : 'justify-start'}">
                        <div class="message-bubble ${msg.sender === 'admin' ? 'sent' : 'received'}">
                            ${msg.message}
                            <p class="text-[10px] mt-1 opacity-75">${msg.timestamp}</p>
                        </div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                container.innerHTML = '<div class="text-red-400 text-center py-8">Failed to load messages</div>';
            }
        }

        async function sendAdminReply() {
            const input = document.getElementById('replyInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "submitMessage",
                        senderId: "admin",
                        receiverId: currentUserId || "user123", // Change as needed
                        message: text
                    })
                });
                input.value = '';
                loadAdminMessages();
            } catch (e) {
                alert("Failed to send reply");
            }
        }

        // Load messages when page opens
        loadAdminMessages();
        setInterval(loadAdminMessages, 3000);
    </script>
</body>
</html>
