<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BBVA Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000c1e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .sidebar { background-color: #000000; border-right: 1px solid #112233; }
        .message-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; }
        .received { 
            background: #072146; 
            border: 1px solid #004481;
            border-bottom-left-radius: 4px; 
            color: #ffffff;
        }
        .sent { 
            background: linear-gradient(90deg, #0073ea 0%, #0056b3 100%);
            border-bottom-right-radius: 4px; 
            color: white; 
        }
        .premium-input {
            background-color: #020b18;
            border: 1px solid #004481;
            transition: all 0.3s ease;
        }
        .premium-input:focus {
            border-color: #0073ea;
            box-shadow: 0 0 8px rgba(0, 115, 234, 0.4);
            outline: none;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-[#112233] bg-[#000c1e] shrink-0">
        <h1 class="text-lg font-bold tracking-wider text-white"><i class="fa-solid fa-shield-halved mr-2 text-blue-500"></i>BBVA Admin Center</h1>
        <div id="activeUserLabel" class="text-xs font-medium text-gray-400 italic">Select a user to begin</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-1/4 sidebar flex flex-col overflow-y-auto">
            <div class="p-4 border-b border-[#112233]">
                <p class="text-[10px] font-bold uppercase tracking-widest text-blue-500">Active Conversations</p>
            </div>
            <div id="userListContainer" class="flex-1 divide-y divide-[#112233]">
                <div class="text-center text-xs text-gray-500 py-8">Loading sessions...</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col bg-[#000c1e]">
            <div id="chatContainer" class="flex-1 p-6 overflow-y-auto space-y-4">
                <div class="h-full flex items-center justify-center text-gray-600 text-sm">
                    <div class="text-center">
                        <i class="fa-regular fa-comments text-4xl mb-3 text-blue-900/30"></i>
                        <p>No active session selected</p>
                    </div>
                </div>
            </div>

            <!-- Reply Box -->
            <div class="p-4 border-t border-[#112233] bg-[#000c1e] shrink-0">
                <div class="flex gap-2">
                    <input type="text" id="replyInput" placeholder="Type a response..." disabled
                           class="flex-1 rounded-xl px-5 py-3.5 text-white premium-input placeholder-gray-500 text-sm disabled:opacity-50"
                           onkeypress="if(event.key === 'Enter') sendAdminReply()">
                    <button id="sendBtn" onclick="sendAdminReply()" disabled
                            class="bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-xl font-bold transition flex items-center justify-center disabled:opacity-50">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYds8gGtgIOA8QiCyyWaI-v3vEdX7_02siN7JEfHT7syAhVb_knK32PaIzTCM1iUdXqA/exec";
        let currentUserId = null;

        async function updateSidebar() {
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=all`);
                const result = await res.json();
                if (result.status === "success") {
                    const listContainer = document.getElementById('userListContainer');
                    const chats = result.messages;
                    const activeUsers = new Set();
                    chats.forEach(msg => {
                        if (msg.sender !== 'admin') activeUsers.add(msg.sender);
                        if (msg.receiver !== 'admin' && msg.receiver) activeUsers.add(msg.receiver);
                    });

                    if (activeUsers.size === 0) {
                        listContainer.innerHTML = '<div class="text-center text-xs text-gray-500 py-8">No active chats</div>';
                        return;
                    }

                    listContainer.innerHTML = Array.from(activeUsers).map(user => `
                        <div onclick="selectUser('${user}')" 
                             class="p-4 cursor-pointer transition flex items-center justify-between ${user === currentUserId ? 'bg-blue-950/30 border-l-4 border-blue-500' : 'hover:bg-blue-950/10'}">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-blue-900/40 flex items-center justify-center text-blue-300 text-xs font-bold">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-white">${user}</p>
                                    <p class="text-[9px] text-green-500 mt-0.5">Online</p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("Sidebar sync error"); }
        }

        function selectUser(userId) {
            currentUserId = userId;
            document.getElementById('activeUserLabel').innerText = `Chatting with: ${userId}`;
            document.getElementById('replyInput').removeAttribute('disabled');
            document.getElementById('sendBtn').removeAttribute('disabled');
            updateSidebar();
            loadAdminMessages();
        }

        async function loadAdminMessages() {
            if (!currentUserId) return;
            const container = document.getElementById('chatContainer');
            try {
                const res = await fetch(`${API_URL}?action=getMessages&userId=${currentUserId}`);
                const result = await res.json();
                if (result.status === "success") {
                    container.innerHTML = result.messages.map(msg => `
                        <div class="flex ${msg.sender === 'admin' ? 'justify-end' : 'justify-start'}">
                            <div class="message-bubble ${msg.sender === 'admin' ? 'sent' : 'received'} shadow-md">
                                ${msg.message}
                                <p class="text-[9px] mt-1 opacity-60 text-right">${msg.timestamp}</p>
                            </div>
                        </div>
                    `).join('');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) { container.innerHTML = '<div class="text-red-400 text-center py-8 text-xs">Load error</div>'; }
        }

        async function sendAdminReply() {
            const input = document.getElementById('replyInput');
            const text = input.value.trim();
            if (!text || !currentUserId) return;
            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "submitMessage", senderId: "admin", receiverId: currentUserId, message: text })
                });
                input.value = '';
                loadAdminMessages();
            } catch (e) { alert("Sending failed."); }
        }

        updateSidebar();
        setInterval(() => { updateSidebar(); loadAdminMessages(); }, 3000);
    </script>
</body>
</html>
